<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Innovators Club | Join</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container navbar">
            <a href="index.html" class="logo" aria-label="Tech Innovators Club Home">
                <img src="7528.jpg_wh1200.jpg" alt="Tech Innovators Club Logo">
                <span>Tech Innovators Club</span>
            </a>

            <button class="menu-toggle" aria-label="Open navigation menu" aria-expanded="false">☰</button>

            <nav class="nav-menu">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="events.html">Events</a></li>
                    <li><a href="join.html" class="active">Join</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="form-section card reveal">
            <h1>Join the Club</h1>
            <p>Fill in the details below to become a member of Tech Innovators Club.</p>

            <form id="joinForm" action="#" method="post" novalidate>
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" placeholder="Enter your full name" required>
                    <small class="error-message"></small>
                </div>

                <div class="form-group">
                    <label for="branch">Branch</label>
                    <input type="text" id="branch" name="branch" placeholder="Example: CSE" required>
                    <small class="error-message"></small>
                </div>

                <div class="form-group">
                    <label for="year">Year</label>
                    <select id="year" name="year" required>
                        <option value="">-- Select Year --</option>
                        <option value="1st Year">1st Year</option>
                        <option value="2nd Year">2nd Year</option>
                        <option value="3rd Year">3rd Year</option>
                        <option value="4th Year">4th Year</option>
                    </select>
                    <small class="error-message"></small>
                </div>

                <div class="form-group">
                    <label for="email">College Email</label>
                    <input type="email" id="email" name="email" placeholder="example@college.edu" required>
                    <small class="error-message"></small>
                </div>

                <button type="submit" class="btn-submit">Submit Application</button>
                <p id="formMessage" class="form-message" role="status"></p>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2025 Tech Innovators Club | KIET</p>
    </footer>

    <button id="backToTop" class="back-to-top" aria-label="Back to top">↑</button>
    <script src="script.js"></script>
</body>
</html>
